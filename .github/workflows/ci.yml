name: critical-security-tests

on:
  push:
  pull_request:

jobs:
  critical-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical regression suite
        run: |
          pytest tests/test_security_flow.py tests/test_classical_engine_validation.py tests/test_quantum_fallback_shape.py -v
